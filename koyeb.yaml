name: bridge-telegram-bot
region: fra
scale:
  min: 1
  max: 1

docker:
  image: python:3.10-slim
  command: |
    pip install -r requirements.txt
    python bot.py

env:
  - key: BOT_TOKEN
    value: "YOUR_BOT_TOKEN_HERE"
    secret: true

checks:
  - name: health
    type: http
    path: /health
    port: 8080
    interval: 30s
    timeout: 5s
    retries: 3
